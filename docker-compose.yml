# Geliştirme ortamı: Next.js uygulaması + Postgres veritabanı birlikte.
# Başlatmak için:  docker compose up
# Veritabanını doldurmak için (bir kez):  docker compose exec web npm run seed
# Site:  http://localhost:3000   |   Panel: http://localhost:3000/admin

# Sabit proje adı: klasör adı değişse bile aynı container/veritabanı kullanılır
# (veriler korunur). Bu satırı değiştirmeyin.
name: medikal-eticaret

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medikal
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medikal"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      # db servisindeki Postgres'e bağlanır → uygulama otomatik DB modunda çalışır.
      DATABASE_URL: postgres://postgres:postgres@db:5432/medikal
      ADMIN_PASSWORD: admin123
      # Docker içinde dosya değişikliklerini yakalamak için:
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
